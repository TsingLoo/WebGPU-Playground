<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    /* Continuous floating effect for the entire group */
    .axis-group {
      transform-origin: 16px 16px;
      animation: float 4s ease-in-out infinite;
    }

    /* Base line properties */
    .line {
      stroke-width: 3.5;
      stroke-linecap: round;
      stroke-dasharray: 30;
      stroke-dashoffset: 0; 
    }

    /* 6-second loop mapped to cubic-bezier for snappy easing */
    .axis-z { stroke: #007AFF; animation: loop-z 6s cubic-bezier(0.2, 0.8, 0.2, 1) infinite; }
    .axis-x { stroke: #FF3b30; animation: loop-x 6s cubic-bezier(0.2, 0.8, 0.2, 1) infinite; }
    .axis-y { stroke: #34C759; animation: loop-y 6s cubic-bezier(0.2, 0.8, 0.2, 1) infinite; }

    /* Static Origin Dot Base */
    .color-dot { fill: #FFFFFF; stroke: #222; stroke-width: 1.5; }
    .shadow-line { stroke: rgba(0, 0, 0, 0.1); }
    .shadow-dot { fill: rgba(0, 0, 0, 0.2); }

    /* The new Confirmation Pop for the origin circle */
    .anim-dot {
      transform-origin: 16px 16px; /* Anchor the scale to the center of the dot */
      animation: pop 6s ease-in-out infinite;
    }

    /* TIMELINES */
    /* Z extends first, shrinks last */
    @keyframes loop-z {
      0%, 5% { stroke-dashoffset: 30; }        
      20%, 85% { stroke-dashoffset: 0; }       
      95%, 100% { stroke-dashoffset: 30; }     
    }
    
    /* X extends second, shrinks second */
    @keyframes loop-x {
      0%, 10% { stroke-dashoffset: 30; }
      25%, 80% { stroke-dashoffset: 0; }
      90%, 100% { stroke-dashoffset: 30; }
    }
    
    /* Y extends last, shrinks first */
    @keyframes loop-y {
      0%, 15% { stroke-dashoffset: 30; }
      30%, 75% { stroke-dashoffset: 0; }
      85%, 100% { stroke-dashoffset: 30; }
    }

    /* The tween animation: pops right when the axes finish retracting at 0% */
    @keyframes pop {
      0% { transform: scale(1); }
      1.5% { transform: scale(1.4); } /* Over-scale for impact */
      3% { transform: scale(0.9); }   /* Slight squash */
      5% { transform: scale(1); }     /* Return to normal just as Z starts drawing */
      100% { transform: scale(1); }
    }

    /* Subtle bobbing independent of the draw loop */
    @keyframes float {
      0%, 100% { transform: translateY(0px) scale(1); }
      50% { transform: translateY(-2px) scale(1.03); }
    }
  </style>

  <g class="axis-group">
    <g transform="translate(1.5, 1.5)">
      <line class="line shadow-line axis-z" x1="16" y1="16" x2="6" y2="26" />
      <line class="line shadow-line axis-x" x1="16" y1="16" x2="28" y2="16" />
      <line class="line shadow-line axis-y" x1="16" y1="16" x2="16" y2="3" />
      <circle class="shadow-dot anim-dot" cx="16" cy="16" r="3" />
    </g>

    <g>
      <line class="line axis-z" x1="16" y1="16" x2="6" y2="26" />
      <line class="line axis-x" x1="16" y1="16" x2="28" y2="16" />
      <line class="line axis-y" x1="16" y1="16" x2="16" y2="3" />
      <circle class="color-dot anim-dot" cx="16" cy="16" r="3" />
    </g>
  </g>
</svg>